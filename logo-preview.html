<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUS AI — ロゴプレビュー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@400;600;900&family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #0c0c1d;
      color: #e8eaf6;
      min-height: 100vh;
      padding: 48px 24px;
    }
    h1 {
      font-family: 'M PLUS 1', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #8892b0;
      text-transform: uppercase;
      margin-bottom: 48px;
      text-align: center;
    }
    .previews {
      display: flex;
      flex-direction: column;
      gap: 48px;
      max-width: 900px;
      margin: 0 auto;
    }
    .preview-block {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .preview-label {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: #4a5568;
      text-transform: uppercase;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      border-left: 2px solid #6366f1;
      padding-left: 10px;
    }
    .preview-bg {
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      gap: 64px;
      flex-wrap: wrap;
    }
    .preview-bg--dark    { background: #0c0c1d; border: 1px solid rgba(255,255,255,0.08); }
    .preview-bg--dark2   { background: #13132b; border: 1px solid rgba(255,255,255,0.08); }
    .preview-bg--glass   {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .preview-bg--light   { background: #f0f0f8; border: 1px solid #dde1e7; }
    .preview-bg--white   { background: #ffffff; border: 1px solid #e2e8f0; }
    .preview-bg--gradient {
      background: linear-gradient(135deg, #1a1a3e, #0c2340);
      border: 1px solid rgba(99,102,241,0.2);
    }

    /* ロゴSVG（インライン） */
    .logo-inline svg { display: block; }

    /* サイズバリエーション */
    .size-row {
      display: flex;
      align-items: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    /* アイコンのみ版 */
    .icon-only {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 8px 0;
    }

    /* 補足テキスト */
    .note {
      font-size: 0.72rem;
      color: #4a5568;
      font-family: 'Inter', sans-serif;
      text-align: center;
      margin-top: 4px;
    }
  </style>
</head>
